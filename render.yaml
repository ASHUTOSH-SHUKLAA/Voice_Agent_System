services:
  - type: web
    name: voice-agent-system
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REDIS_URL
        sync: false
      - key: REDIS_KEY_PREFIX
        value: voice-agent
      - key: CORS_ORIGIN
        sync: false
